# Supabase local dev config. `supabase start` boots a local stack;
# `supabase db push` applies supabase/migrations to the linked remote project.
project_id = "viralytics"

[db]
port = 54322
major_version = 15

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
